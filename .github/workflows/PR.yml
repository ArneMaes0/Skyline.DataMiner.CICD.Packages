name: PR - Basic Build & Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit tests
        shell: bash
        run: dotnet test --no-build --filter "TestCategory!=IntegrationTest&TestCategory!=IntegrationTests"
