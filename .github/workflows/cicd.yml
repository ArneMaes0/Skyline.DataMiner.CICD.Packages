name: DataMiner CICD NuGet Solution

on:
  push:
    branches:
      - '**'
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-**"

  workflow_dispatch:

jobs:
  CICD:
    if: github.ref_type == 'branch' || (github.ref_type == 'tag' && !contains(github.ref, '-internal.'))
    uses: SkylineCommunications/_ReusableWorkflows/.github/workflows/Master Workflow.yml@main
    with:
      sonarcloud-project-name: SkylineCommunications_Skyline.DataMiner.CICD.Packages
      solution-filter-name: Skyline.DataMiner.CICD.Packages.sln
      nuget-push-source: https://api.nuget.org/v3/index.json
      runs-on: windows-latest
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGETAPIKEY }}

  internal-prerelease:
    if: github.ref_type == 'tag' && contains(github.ref, '-internal.')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup NuGet sources
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-nuget-sources@main
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          include-skyline: 'false'

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          dotnet build "Skyline.DataMiner.CICD.Packages.sln" `
            -p:Version="$env:VERSION" `
            -p:PackageVersion="$env:VERSION" `
            --configuration Release `
            -p:GenerateDataMinerPackage=false `
            -p:PackageOutputPath="${{ github.workspace }}/_NuGetOutput"
        shell: pwsh

      - name: Push NuGet packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGETAPIKEY_GITHUB }}
          REPO_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pushSource = "https://nuget.pkg.github.com/$env:REPO_OWNER/index.json"

          $apiKey = $env:NUGET_API_KEY
          if ([string]::IsNullOrEmpty($apiKey)) {
            $apiKey = $env:GH_TOKEN
          }

          $packages = Get-ChildItem -Path "_NuGetOutput" -Filter "*.nupkg"
          if ($packages.Count -eq 0) {
            Write-Host "No NuGet packages found to push."
            exit 1
          }

          foreach ($pkg in $packages) {
            Write-Host "Pushing $($pkg.Name)..."
            dotnet nuget push $pkg.FullName --api-key $apiKey --source $pushSource
          }
        shell: pwsh
